name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Sync deps (with dev extras)
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Typecheck (pyright)
        run: uv run pyright

      - name: Tests (pytest)
        run: uv run pytest -q

      - name: Validate agentic artifacts (ADR-0020)
        run: uv run python scripts/validate_artifacts.py

      - name: Anti-hardcode gate (ADR-0009)
        run: |
          if grep -rE '\b(BTC|ETH|SOL)\b' src/; then
            echo "Symbol hardcode detected in src/ — ver ADR-0009."
            exit 1
          fi
