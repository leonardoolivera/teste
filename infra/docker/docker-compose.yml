version: "3.9"

services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: biblioteca_ifms
      POSTGRES_USER: biblioteca
      POSTGRES_PASSWORD: biblioteca
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6379:6379"

  backend:
    build:
      context: ../..
      dockerfile: infra/docker/backend.Dockerfile
    command: python backend/manage.py runserver 0.0.0.0:8000
    env_file:
      - ../../backend/.env.example
    volumes:
      - ../..:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
